name: Set up SSH
description: Configure an SSH key and known_hosts entry for deployment jobs.
inputs:
  host:
    description: Remote SSH host.
    required: true
  port:
    description: Remote SSH port.
    required: false
    default: "22"
  private-key:
    description: Private key used for remote SSH access.
    required: true
runs:
  using: composite
  steps:
    - name: Configure SSH key
      shell: bash
      env:
        SSH_HOST: ${{ inputs.host }}
        SSH_PORT: ${{ inputs.port }}
        SSH_PRIVATE_KEY: ${{ inputs['private-key'] }}
      run: |
        set -euo pipefail
        install -m 700 -d ~/.ssh
        printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        touch ~/.ssh/known_hosts
        ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts
