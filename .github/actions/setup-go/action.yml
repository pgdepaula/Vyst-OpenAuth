name: Set up Go toolchain
description: Install the Go version declared by go.mod and configure module and build caching.
inputs:
  cache-dependency-path:
    description: Newline-separated dependency files used for Go cache keys.
    required: false
    default: |
      go.sum
      examples/demo-app/go.sum
runs:
  using: composite
  steps:
    - name: Set up Go from go.mod
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: ${{ inputs['cache-dependency-path'] }}

    - name: Report Go environment
      shell: bash
      run: |
        set -euo pipefail
        echo "Using $(go version)"
        echo "Module cache: $(go env GOMODCACHE)"
        echo "Build cache: $(go env GOCACHE)"
