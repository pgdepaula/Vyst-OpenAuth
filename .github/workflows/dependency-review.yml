name: Dependency Review

on:
  pull_request:
    branches:
      - main
    paths:
      - "go.mod"
      - "go.sum"
      - "examples/demo-app/go.mod"
      - "examples/demo-app/go.sum"
      - "web/vyst-ui/package.json"
      - "web/vyst-ui/package-lock.json"
      - "test/load/package.json"
      - ".github/workflows/dependency-review.yml"

permissions:
  contents: read

concurrency:
  group: dependency-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Review dependency diff
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: false
          vulnerability-check: true
          license-check: true
