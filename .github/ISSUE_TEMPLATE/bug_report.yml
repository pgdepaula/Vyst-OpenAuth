name: Bug Report 🐛
description: File a structured report to help us reproduce and fix a bug.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below as accurately as possible to help us diagnose and fix the issue.

  - type: input
    id: summary
    attributes:
      label: Bug Summary
      description: A clear and concise description of what the bug is.
      placeholder: e.g. JWT verification fails when active company changes
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which area of Vyst Open Auth does this bug affect?
      options:
        - "API (identity-api)"
        - "Sentinel Worker (sentinel-worker)"
        - "Billing Worker (billing-worker)"
        - "Admin UI (vyst-ui)"
        - "Database / Migrations"
        - "Other / Security"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: What steps did you take to encounter the bug?
      placeholder: |
        1. Run `docker-compose up -d`
        2. Run `make run`
        3. Send a request to `/auth/switch-company` with invalid payload
        4. See error...
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: Expected & Actual Behavior
      description: What did you expect to happen, and what happened instead?
      placeholder: |
        Expected: A clean JSON error returning status 400.
        Actual: Server panicked with nil pointer dereference.
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment Info
      description: Versions of Go, Docker, Node.js, and Operating System.
      placeholder: e.g. Go 1.26, Ubuntu 24.04, Docker 26.1
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: Logs or Stack Traces
      description: Please paste any relevant server logs, Docker console outputs, or OpenTelemetry traces here.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checklists
      options:
        - label: I have searched existing issues to ensure this is not a duplicate.
          required: true
        - label: I agree to follow the project's Code of Conduct and Contributing Guidelines.
          required: true
