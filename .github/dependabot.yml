version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      actions:
        patterns:
          - "*"

  # Go modules (root)
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    groups:
      go-root:
        patterns:
          - "*"

  # Go modules (demo-app)
  - package-ecosystem: "gomod"
    directory: "/examples/demo-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "go"
    groups:
      go-demo:
        patterns:
          - "*"

  # npm (web/vyst-ui)
  - package-ecosystem: "npm"
    directory: "/web/vyst-ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    groups:
      npm-deps:
        patterns:
          - "*"
