<div class="min-h-screen flex items-center justify-center bg-gray-50 py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-lg shadow">
    <div class="text-center">
      <h2 class="mt-6 text-3xl font-extrabold text-gray-900">Email Verification</h2>
      
      @if (status() === 'verifying') {
        <div class="mt-4 flex flex-col items-center">
          <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
          <p class="mt-2 text-sm text-gray-600">Verifying your email address...</p>
        </div>
      }

      @if (status() === 'success') {
        <div class="mt-4">
          <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100">
            <svg class="h-6 w-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
          </div>
          <p class="mt-2 text-sm text-green-600">Email verified successfully!</p>
          <p class="mt-1 text-xs text-gray-500">Redirecting to login...</p>
        </div>
      }

      @if (status() === 'error') {
        <div class="mt-4">
          <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100">
            <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </div>
          <p class="mt-2 text-sm text-red-600">{{ errorMessage() }}</p>
          <div class="mt-4">
            <a routerLink="/login" class="text-indigo-600 hover:text-indigo-500">Return to Login</a>
          </div>
        </div>
      }
    </div>
  </div>
</div>
