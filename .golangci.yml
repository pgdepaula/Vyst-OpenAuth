version: "2"
run:
  tests: true
linters:
  enable:
    - gocyclo
    - gosec
    - misspell
    - prealloc
    - unconvert
    - unparam
  settings:
    gocyclo:
      min-complexity: 15
    gosec:
      excludes:
        - G104
        - G101
        - G115
        - G117
        - G118
        - G124
        - G703
        - G706
    staticcheck:
      checks: ["all", "-QF*", "-ST*"]
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
