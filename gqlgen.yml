schema:
  - api/graphql/*.graphql

exec:
  filename: internal/interfaces/graphql/generated.go
  package: graphql

model:
  filename: internal/interfaces/graphql/model/models_gen.go
  package: model

resolver:
  layout: follow-schema
  dir: internal/interfaces/graphql/resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

autobind:
  - "github.com/vyst/identity/internal/domain/user"
  - "github.com/vyst/identity/internal/domain/tenant"

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
  Int:
    model:
      - github.com/99designs/gqlgen/graphql.Int
      - github.com/99designs/gqlgen/graphql.Int64
      - github.com/99designs/gqlgen/graphql.Int32
